<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas Agendadas - Seu Bem Estar</title>

    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<header>

    <div class="logo">
        <h1>Seu Bem Estar</h1>
        <p>Cuidando da sua saúde com carinho e dedicação.</p>
    </div>

    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="agendamento.html">Agendamento</a>
        <a href="consultas.html">Consultas</a>
    </nav>

</header>


<main class="pagina">

    <h2>Consultas Agendadas</h2>

    <p>
        Nesta página serão exibidos todos os agendamentos cadastrados.
    </p>


    <table>

        <thead>
            <tr>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>Data</th>
                <th>Horário</th>
                <th>Telefone</th>
            </tr>
        </thead>


        <tbody id="tabelaConsultas">

            <tr>
                <td colspan="5">
                    Carregando consultas...
                </td>
            </tr>

        </tbody>

    </table>


</main>


<footer>

    <p>© 2026 Seu Bem Estar - Clínica Médica</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="JS/supabase.js"></script>


<script>

async function carregarConsultas() {

    const tabela = document.getElementById("tabelaConsultas");


    const { data, error } = await window.supabaseClient
        .from("consultas")
        .select("*")
        .order("data", { ascending: true });


    if (error) {

        tabela.innerHTML =
        "<tr><td colspan='5'>Erro ao carregar consultas.</td></tr>";

        console.error(error);

        return;
    }


    if (data.length === 0) {

        tabela.innerHTML =
        "<tr><td colspan='5'>Nenhuma consulta cadastrada.</td></tr>";

        return;
    }


    tabela.innerHTML = "";


    data.forEach(c => {

        tabela.innerHTML += `

        <tr>

            <td>${c.nome}</td>

            <td>${c.especialidade}</td>

            <td>${c.data}</td>

            <td>${c.horario}</td>

            <td>${c.telefone}</td>

        </tr>

        `;

    });


}


carregarConsultas();


</script>


</body>

</html>
